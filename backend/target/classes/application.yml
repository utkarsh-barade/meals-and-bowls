spring:
  application:
    name: meals-bowls
  main:
    lazy-initialization: true

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/meals_bowls}


server:
  port: ${PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-256-bits-long-at-minimum}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}

  admin:
    mobile: ${ADMIN_MOBILE:9999999999}
    password: ${ADMIN_PASSWORD:admin123}

  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

  whatsapp:
    test-number: ${WHATSAPP_TEST_NUMBER:}

logging:
  level:
    com.mealsbowls: DEBUG
    org.springframework.security: INFO
