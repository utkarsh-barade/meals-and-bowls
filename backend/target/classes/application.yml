spring:
  application:
    name: meals-bowls

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/meals_bowls}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-256-bits-long-at-minimum}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}

  admin:
    mobile: ${ADMIN_MOBILE:9999999999}
    password: ${ADMIN_PASSWORD:admin123}

  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

  whatsapp:
    test-number: ${WHATSAPP_TEST_NUMBER:}

logging:
  level:
    com.mealsbowls: DEBUG
    org.springframework.security: INFO
